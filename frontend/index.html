<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiffGuardAI - Your AI Code Guardian</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
</head>
<body class="bg-gradient-to-br from-indigo-900 to-purple-900 min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold animate__animated animate__fadeIn">DiffGuardAI</h1>
            <p class="text-xl mt-2">Your AI-Powered Code Review Companion</p>
            <div class="streak-counter mt-4 animate__animated animate__bounceIn">
                <span class="text-2xl">🔥 Current Streak: <span id="streakCount">0</span> days</span>
            </div>
        </div>

        <div class="achievements-bar flex justify-center gap-4 mb-8">
            <div class="achievement p-2 bg-purple-800 rounded-lg cursor-pointer hover:bg-purple-700 transition">
                <span class="text-2xl">🎯</span>
                <span class="ml-2">First Review</span>
            </div>
            <div class="achievement p-2 bg-purple-800 rounded-lg cursor-pointer hover:bg-purple-700 transition">
                <span class="text-2xl">⭐</span>
                <span class="ml-2">Pro Reviewer</span>
            </div>
            <div class="achievement p-2 bg-purple-800 rounded-lg cursor-pointer hover:bg-purple-700 transition">
                <span class="text-2xl">👑</span>
                <span class="ml-2">Code Master</span>
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            <div class="w-full md:w-2/3 bg-gray-800 p-6 rounded-xl shadow-lg">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-bold">Code Diff Analysis</h2>
                    <div class="difficulty-selector">
                        <select class="bg-purple-700 rounded p-2">
                            <option>Easy Mode</option>
                            <option>Normal Mode</option>
                            <option>Expert Mode</option>
                        </select>
                    </div>
                </div>
                <textarea id="diffInput" class="w-full h-64 bg-gray-900 p-4 rounded-lg font-mono" placeholder="Paste your code diff here..."></textarea>
                <button onclick="analyzeDiff()" class="mt-4 bg-green-600 hover:bg-green-500 px-6 py-2 rounded-lg font-bold transition-colors animate__animated animate__pulse animate__infinite">
                    Analyze Changes 🚀
                </button>
            </div>

            <div class="w-full md:w-1/3">
                <div class="bg-gray-800 p-6 rounded-xl shadow-lg mb-6">
                    <h2 class="text-2xl font-bold mb-4">Leaderboard 🏆</h2>
                    <div id="leaderboard" class="space-y-2">
                        <div class="flex justify-between items-center p-2 bg-purple-700 rounded">
                            <span>🥇 John D.</span>
                            <span>2,450 pts</span>
                        </div>
                        <div class="flex justify-between items-center p-2 bg-purple-600 rounded">
                            <span>🥈 Sarah M.</span>
                            <span>2,100 pts</span>
                        </div>
                        <div class="flex justify-between items-center p-2 bg-purple-500 rounded">
                            <span>🥉 Alex K.</span>
                            <span>1,890 pts</span>
                        </div>
                    </div>
                </div>

                <div class="bg-gray-800 p-6 rounded-xl shadow-lg">
                    <h2 class="text-2xl font-bold mb-4">Share Your Success 🌟</h2>
                    <div class="space-y-2">
                        <button onclick="shareToTwitter()" class="w-full bg-blue-400 hover:bg-blue-300 p-2 rounded-lg transition-colors">
                            Share on Twitter 🐦
                        </button>
                        <button onclick="shareToLinkedIn()" class="w-full bg-blue-700 hover:bg-blue-600 p-2 rounded-lg transition-colors">
                            Share on LinkedIn 💼
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="result" class="mt-8 bg-gray-800 p-6 rounded-xl shadow-lg hidden">
            <h2 class="text-2xl font-bold mb-4">Analysis Result</h2>
            <div id="resultContent"></div>
            <div class="mt-4 flex gap-4">
                <button onclick="upvoteAnalysis()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg transition-colors">
                    👍 Helpful
                </button>
                <button onclick="downvoteAnalysis()" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded-lg transition-colors">
                    👎 Not Helpful
                </button>
            </div>
        </div>
    </div>

    <script>
        let streak = 0;
        let points = 0;

        function analyzeDiff() {
            // Simulate analysis
            setTimeout(() => {
                document.getElementById('result').classList.remove('hidden');
                updateStreak();
                awardPoints();
            }, 1500);
        }

        function updateStreak() {
            streak++;
            document.getElementById('streakCount').textContent = streak;
            if (streak % 5 === 0) showAchievement('Streak Master! 🔥');
        }

        function awardPoints() {
            points += Math.floor(Math.random() * 100) + 50;
            showAchievement(`Earned ${points} points! 🌟`);
        }

        function showAchievement(message) {
            const achievement = document.createElement('div');
            achievement.className = 'fixed top-4 right-4 bg-green-600 p-4 rounded-lg animate__animated animate__fadeInRight';
            achievement.textContent = message;
            document.body.appendChild(achievement);
            setTimeout(() => achievement.remove(), 3000);
        }

        function shareToTwitter() {
            window.open(`https://twitter.com/intent/tweet?text=I just analyzed my code with DiffGuardAI and maintained a ${streak}-day streak! 🚀 Join me at diffguard.ai`, '_blank');
        }

        function shareToLinkedIn() {
            window.open('https://www.linkedin.com/sharing/share-offsite/?url=https://diffguard.ai', '_blank');
        }
    </script>
</body>
</html>
