<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicHero - Gamified Governance</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/confetti-js@0.0.18/dist/index.min.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-500 to-purple-600 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <!-- Hero Section with Gamification Elements -->
        <div class="text-center mb-12">
            <h1 class="text-4xl font-bold text-white mb-4">🏆 CivicHero</h1>
            <p class="text-xl text-white opacity-90">Shape Your Community, Earn Rewards!</p>
            <div class="mt-4">
                <span class="inline-block bg-white rounded-full px-4 py-2 text-purple-600 font-bold">
                    Level: <span id="userLevel">5</span> | XP: <span id="userXP">2450</span>/3000
                </span>
            </div>
        </div>

        <!-- Social Feed with Governance Proposals -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Trending Proposals -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-bold mb-4 text-gray-800">🔥 Trending Proposals</h2>
                <div class="space-y-4">
                    <div class="proposal-card hover:bg-gray-50 p-4 rounded-lg border border-gray-200 cursor-pointer transition">
                        <div class="flex items-center justify-between">
                            <span class="text-sm font-semibold text-purple-600">#GreenCity</span>
                            <span class="text-sm text-gray-500">+50 XP</span>
                        </div>
                        <h3 class="font-bold mt-2">Solar Panels in Central Park</h3>
                        <div class="mt-3 flex items-center space-x-4">
                            <button onclick="vote(1)" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 rounded-full transition">Support 👍</button>
                            <button onclick="vote(-1)" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2 rounded-full transition">Oppose 👎</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Achievement Board -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-2xl font-bold mb-4 text-gray-800">🌟 Your Achievements</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="achievement-card bg-gradient-to-r from-yellow-400 to-yellow-500 p-4 rounded-lg text-white">
                        <h3 class="font-bold">Super Voter</h3>
                        <p class="text-sm">Voted on 50 proposals</p>
                        <span class="text-xs mt-2 block">+100 XP Bonus!</span>
                    </div>
                    <div class="achievement-card bg-gradient-to-r from-blue-400 to-blue-500 p-4 rounded-lg text-white">
                        <h3 class="font-bold">Trend Setter</h3>
                        <p class="text-sm">Created viral proposal</p>
                        <span class="text-xs mt-2 block">+200 XP Bonus!</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Create Proposal Button -->
        <div class="fixed bottom-8 right-8">
            <button onclick="showProposalModal()" class="bg-yellow-400 hover:bg-yellow-500 text-gray-900 font-bold py-4 px-6 rounded-full shadow-lg transform hover:scale-105 transition">
                ✨ Create Proposal
            </button>
        </div>
    </div>

    <script>
        function vote(direction) {
            // Animate vote
            const confetti = new ConfettiGenerator({
                target: 'confetti-canvas',
                max: 80,
                size: 1,
                animate: true,
                props: ['circle', 'square'],
                colors: [[165, 104, 246], [230, 61, 135], [0, 199, 228]]
            });
            confetti.render();
            
            // Update XP
            const xpElement = document.getElementById('userXP');
            const currentXP = parseInt(xpElement.innerText);
            xpElement.innerText = currentXP + 50;
            
            // Level up animation if needed
            if (currentXP + 50 >= 3000) {
                const levelElement = document.getElementById('userLevel');
                levelElement.innerText = parseInt(levelElement.innerText) + 1;
                // Add level up celebration effects
            }
        }

        function showProposalModal() {
            // Show create proposal modal
            alert('Coming soon: Create your own proposal and earn bonus XP!');
        }
    </script>
    <canvas id="confetti-canvas" style="position: fixed; top: 0; left: 0; pointer-events: none;"></canvas>
</body>
</html>
